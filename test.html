<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>A-Frame カメラテスト</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body { margin:0; background:#000; }
    #msg { position:fixed; top:20px; left:20px; right:20px; background:rgba(0,0,0,.7);
           color:#fff; font-family:sans-serif; font-size:14px; padding:12px 16px;
           border-radius:10px; z-index:99; line-height:1.8; }
  </style>
</head>
<body>
  <div id="msg">カメラテスト起動中…</div>
  <a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled: false">
    <a-box position="0 0 -1" color="#2563AA" width="0.3" height="0.3" depth="0.3"
      animation="property:rotation; to:0 360 0; loop:true; dur:3000"></a-box>
    <a-camera></a-camera>
  </a-scene>
  <script>
    document.querySelector('a-scene').addEventListener('loaded', function() {
      document.getElementById('msg').textContent = '✓ A-Frame 起動成功！カメラ映像の上に青い立方体が回っていれば成功です';
      document.getElementById('msg').style.background = 'rgba(34,197,94,.8)';
    });
    window.addEventListener('error', function(e) {
      document.getElementById('msg').textContent = 'エラー: ' + e.message;
      document.getElementById('msg').style.background = 'rgba(239,68,68,.8)';
    });
  </script>
</body>
</html>
