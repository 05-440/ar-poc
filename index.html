<!DOCTYPE html>
<html>
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="utf-8">
  <title>SABA AR - umios</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <link rel="stylesheet" type="text/css" href="./jscss/ar.css">

  <style>
    #tapOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 5;
      display: none;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.007; filterBeta: 0.010; maxTrack: 1;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  id="scene"
>

  <a-assets>
    <a-asset-item id="sabaModel0" src="assets/sabaAnime_Illustration0216.glb"></a-asset-item>
    <a-asset-item id="sabaModel1" src="assets/sabaAnime_natural0212.glb"></a-asset-item>
    <a-asset-item id="kanModel"     src="assets/kan.obj"></a-asset-item>
    <a-asset-item id="kanMaskModel" src="assets/kanOuter.obj"></a-asset-item>
    <img id="emvmapImg"   src="assets/emvmap.jpg" />
    <img id="tapImg"      src="assets/tapIcon.png" />
    <img id="restartImg"  src="assets/restart.png" />
    <img id="kanAOImg"    src="assets/kanAO.jpg" />
    <img id="kanOuterImg" src="assets/kanB.jpg" />
    <img id="targertImg"  src="assets/targetImage.png" />
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-plane id="beforeTrack" position="0 -0.03 -0.2" scale="0.12 0.12 0.12"
      material="src:#targertImg;opacity:0.5;">
    </a-plane>
  </a-camera>

  <a-light type="ambient" intensity="1"></a-light>
  <a-entity light="type:directional;intensity:1.5;" position="0 1 0"></a-entity>

  <!-- 蓋マーカー（targetIndex: 0 のみ） -->
  <a-entity id="imageTarget0" mindar-image-target="targetIndex: 0">
    <a-entity id="allscale0" scale="1.5 1.5 1.5" position="0 0 0.5" rotation="0 0 0">

      <a-entity id="kanMask0">
        <a-entity obj-model="obj:#kanMaskModel" rotation="0 -17 0"
          material="opacity:0;roughness:0.9;metalness:1;sphericalEnvMap:#emvmapImg;src:#kanOuterImg;"
          animation__f="property: material.opacity; from:0; to:1; dur:1; startEvents:in;"
          animation__f2="property: material.opacity; from:0.9; to:0; dur:1000; startEvents:out;">
        </a-entity>
      </a-entity>

      <a-plane id="tapBtn0" position="0 0.6 0.5" scale="0.6 0.6 0.6" rotation="-30 0 0"
        material="src:#tapImg;alphaTest:0.2;side:double;shader:flat;opacity:0.7;">
      </a-plane>

      <a-entity id="sabaBlock0">
        <a-entity visible="false" gltf-model="#sabaModel0" rotation="0 -90 0" animation-mixer="timeScale:0;"></a-entity>
        <a-entity visible="false" gltf-model="#sabaModel1" rotation="0 -90 0" animation-mixer="timeScale:0;"></a-entity>
      </a-entity>

      <a-entity id="kan0" obj-model="obj:#kanModel"
        material="opacity:0;roughness:0;metalness:1;color:#FEEF7E;sphericalEnvMap:#emvmapImg;src:#kanAOImg;"
        animation__f="property: material.opacity; from:0; to:1; dur:1; startEvents:in;">
      </a-entity>

      <a-plane id="restartBtn0" position="0 0 0.7" scale="0 0 0" rotation="-40 0 0"
        material="src:#restartImg;alphaTest:0.2;side:double;shader:flat;opacity:0;"
        animation__f="property: material.opacity; from:0; to:1; dur:1000; startEvents:in;">
      </a-plane>

    </a-entity>
  </a-entity>

</a-scene>

<div id="tapOverlay"></div>
<div id="capType"></div>

<div id="capturePreview" style="display:none;">
  <img id="captureImg" src="" style="max-width:100%;max-height:80vh;">
  <video id="captureVideo" src="" style="max-width:100%;max-height:80vh;" controls></video>
  <div id="captureActions">
    <button id="captureSave">保存</button>
    <button id="captureClose">閉じる</button>
  </div>
</div>

<script src="./jscss/ar.js"></script>
</body>
</html>
